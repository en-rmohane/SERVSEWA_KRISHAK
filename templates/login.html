<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ServeSewa Billing System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/index.css') }}">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            font-family: 'Inter', sans-serif;
            color: white;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 420px;
            text-align: center;
        }
        .login-card h2 {
            font-size: 2rem;
            font-weight: 900;
            margin-bottom: 30px;
            color: #2e7d32;
            text-shadow: 0 0 15px rgba(46, 125, 50, 0.3);
        }
        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-size: 0.8rem; margin-bottom: 8px; color: #94a3b8; font-weight: 600; }
        input {
            width: 100%;
            padding: 14px;
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            outline: none;
            transition: 0.3s;
            font-size: 1rem;
        }
        input:focus { border-color: #2e7d32; background: rgba(15, 23, 42, 0.9); }
        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #2e7d32, #1b5e20);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(46, 125, 50, 0.4); }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>ServeSewa Login</h2>
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="flash-messages">
                    {% for message in messages %}
                        {{ message }}
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}
        <form method="POST">
            <div class="input-group">
                <label>Username</label>
                <input type="text" name="username" required placeholder="User ID">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" name="password" required placeholder="Password">
            </div>
            <button type="submit" class="btn-login">Unlock System</button>
        </form>
        <p style="margin-top: 2rem; font-size: 0.8rem; opacity: 0.6;">Secure Access Only</p>
    </div>
</body>
</html>
